spring.application.name=TestPaymentService
server.port=${SERVER_PORT:8080}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

mybatis.configuration.map-underscore-to-camel-case=true

mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:repository/*.xml

mybatis.type-handlers-package=com.samyasotero.testpaymentservice.config


custom.aws.region=${AWS_REGION:us-east-1}
custom.aws.access-key=${AWS_ACCESS_KEY_ID}
custom.aws.secret-key=${AWS_SECRET_ACCESS_KEY}
custom.aws.session-token=${AWS_SESSION_TOKEN}

#AWS_ACCESS_KEY_ID=${ACESS_LOGS_KEY}
#AWS_SECRET_ACCESS_KEY=${ACESS_LOGS_SECRET_KEY}

spring.flyway.baseline-on-migrate=true